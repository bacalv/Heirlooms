services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: heirloom
      POSTGRES_USER: heirloom
      POSTGRES_PASSWORD: heirloom_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heirloom"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/heirloom-bucket
      "

  heirloom-server:
    image: ${HEIRLOOM_SERVER_IMAGE:-heirloom-server:latest}
    ports:
      - "8080"
    environment:
      SERVER_PORT: "8080"
      STORAGE_BACKEND: "S3"
      S3_BUCKET: "heirloom-bucket"
      S3_REGION: "us-east-1"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_ENDPOINT_OVERRIDE: "http://minio:9000"
      DB_URL: "jdbc:postgresql://postgres:5432/heirloom"
      DB_USER: "heirloom"
      DB_PASSWORD: "heirloom_test"
      API_KEY: "${API_KEY:-heirloom-integration-test-key}"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 12
