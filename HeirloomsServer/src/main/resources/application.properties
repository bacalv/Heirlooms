# Port the server listens on
server.port=8080

# Storage backend: LOCAL or S3
storage.backend=LOCAL

# --- Local storage ---
storage.dir=uploads

# --- S3 / MinIO storage ---
s3.bucket=
s3.region=us-east-1
s3.access-key=
s3.secret-key=
# Optional: override the S3 endpoint (e.g. for MinIO: http://localhost:9000)
s3.endpoint-override=

# --- Database (PostgreSQL) ---
db.url=jdbc:postgresql://localhost:5432/heirloom
db.user=heirloom
db.password=heirloom

# Preview clip duration for new encrypted video uploads (seconds)
preview.duration.seconds=15
