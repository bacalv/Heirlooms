# Journey 1 — Upload a photo and verify it appears in Just Arrived / Garden
#
# Covers the highest-frequency regression area: BUG-003, BUG-004, BUG-005,
# BUG-013 all touched this upload → garden flow.
#
# The test image is pushed to the device before this flow is launched.
# See the run wrapper in the Makefile / CI workflow which executes:
#
#   adb -s $FARM_DEVICE_CURRENT push \
#     scripts/test-farm/test-assets/test-photo.jpg \
#     /sdcard/Pictures/heirlooms-test-photo.jpg
#
# Run with:
#   source scripts/test-farm/.farm-env
#   source scripts/test-farm/.env
#   # push test image first (see above)
#   maestro test \
#     --device $FARM_DEVICE_CURRENT \
#     --env USER_A_PASSWORD=$USER_A_PASSWORD \
#     --env USER_A_USERNAME=$USER_A_USERNAME \
#     --format junit \
#     --output test-results/farm/$RUN_ID/journey-01.xml \
#     scripts/test-farm/maestro/journey-01-upload-garden.yaml
#
# NOTE: Selector names must be verified against the actual app UI.
# In particular the upload FAB label, bottom-nav label for "Just Arrived",
# and the image thumbnail content description should be confirmed on the
# running staging build before enabling this in CI.

appId: digital.heirlooms.app.test
---
# ---- Launch and unlock vault -----------------------------------------------
- launchApp:
    clearState: false

- assertVisible: "Vault"
- tapOn: "Passphrase"
- inputText: ${USER_A_PASSWORD}
- tapOn: "Unlock"
- assertVisible:
    text: "Garden"
    timeout: 10000

# ---- Trigger upload via share intent from Photos/Files ---------------------
# We use an ACTION_SEND intent to pick the pre-pushed test image rather than
# navigating the share sheet, which varies by Android version.
- runScript:
    file: ../helpers/push-test-image.sh
    # Pushes the test image from local scripts/test-farm/test-assets/test-photo.jpg
    # to /sdcard/Pictures/heirlooms-test-photo.jpg on the connected device.
    # Inline adb push is done by the shell wrapper before launching Maestro.

# Tap the upload / add button in the Garden view.
# Adjust the selector to match the actual FAB label or content description.
- tapOn:
    id: "upload_fab"
    optional: true
- tapOn:
    text: "Upload"
    optional: true

# If an image picker opens, select the test image.
# These selectors depend on the system picker version — adjust as needed.
- assertVisible:
    text: "heirlooms-test-photo"
    timeout: 5000
    optional: true
- tapOn:
    text: "heirlooms-test-photo"
    optional: true

# Confirm / submit the upload (label varies by UI state).
- tapOn:
    text: "Upload"
    optional: true
- tapOn:
    text: "Add to Garden"
    optional: true

# ---- Wait for the upload to complete and appear in Just Arrived -------------
# The upload is async (WorkManager). Poll for the thumbnail to appear.
# Maestro's assertVisible with timeout handles the retry.
- assertVisible:
    text: "Just Arrived"
    timeout: 30000

# Verify the thumbnail row is non-empty — at least one image item is visible.
# Adjust the content description or id to match HeirloomsImage / garden item.
- assertVisible:
    id: "garden_item_thumbnail"
    timeout: 30000

# ---- Done ------------------------------------------------------------------
- stopApp
