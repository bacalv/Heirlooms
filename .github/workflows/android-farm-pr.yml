name: Android device farm — PR smoke

# Triggered on pull requests (and pushes to feature branches) that touch
# Android app code. Runs the J1 + J12 smoke suite on farm-current (Device B)
# only, to give a fast "green light" before merging.
#
# Requirements:
#   - A self-hosted macOS runner with the label "android-farm" registered in
#     the repository Settings → Actions → Runners.
#   - The USB hub with all three devices must be attached to that runner.
#   - The runner machine must be authenticated with gcloud ADC.
#   - Maestro CLI must be installed on the runner: https://maestro.mobile.dev/
#   - Android SDK / adb must be on PATH.

on:
  pull_request:
    paths:
      - 'HeirloomsApp/**'
  push:
    branches-ignore:
      - main
    paths:
      - 'HeirloomsApp/**'

jobs:
  farm-smoke:
    name: Farm smoke — J1 + J12 (farm-current)
    runs-on: [self-hosted, android-farm]
    timeout-minutes: 30

    env:
      # APK built in a prior step; path is relative to repo root.
      STAGING_APK: HeirloomsApp/app/build/outputs/apk/staging/debug/app-staging-debug.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Build the staging debug APK ----------------------------------------
      - name: Build staging debug APK
        run: ./gradlew :HeirloomsApp:app:assembleStaging
        working-directory: .

      # ---- Device connectivity check ------------------------------------------
      - name: Check devices
        run: bash scripts/test-farm/check-devices.sh

      # ---- Deploy APK to farm-current only ------------------------------------
      - name: Deploy APK → farm-current
        run: |
          source scripts/test-farm/.env
          bash scripts/test-farm/deploy-apk.sh \
            --apk "${{ env.STAGING_APK }}" \
            --device "$FARM_DEVICE_CURRENT"

      # ---- Provision test accounts --------------------------------------------
      - name: Provision test accounts
        run: bash scripts/test-farm/provision-accounts.sh

      # ---- Push test image to device ------------------------------------------
      - name: Push test image → farm-current
        run: |
          source scripts/test-farm/.env
          adb -s "$FARM_DEVICE_CURRENT" push \
            scripts/test-farm/test-assets/test-photo.jpg \
            /sdcard/Pictures/heirlooms-test-photo.jpg

      # ---- Journey 12 — flavor smoke ------------------------------------------
      - name: Run Journey 12 (flavor smoke)
        run: |
          source scripts/test-farm/.env
          source scripts/test-farm/.farm-env
          mkdir -p test-results/farm/$RUN_ID
          maestro test \
            --device "$FARM_DEVICE_CURRENT" \
            --env USER_A_PASSWORD="$USER_A_PASSWORD" \
            --env USER_A_USERNAME="$USER_A_USERNAME" \
            --format junit \
            --output "test-results/farm/$RUN_ID/journey-12.xml" \
            scripts/test-farm/maestro/journey-12-flavor-smoke.yaml

      # ---- Journey 1 — upload + garden ----------------------------------------
      - name: Run Journey 1 (upload + garden)
        run: |
          source scripts/test-farm/.env
          source scripts/test-farm/.farm-env
          maestro test \
            --device "$FARM_DEVICE_CURRENT" \
            --env USER_A_PASSWORD="$USER_A_PASSWORD" \
            --env USER_A_USERNAME="$USER_A_USERNAME" \
            --format junit \
            --output "test-results/farm/$RUN_ID/journey-01.xml" \
            scripts/test-farm/maestro/journey-01-upload-garden.yaml

      # ---- Espresso crypto smoke test -----------------------------------------
      - name: Run CryptoSmokeTest (Espresso)
        run: |
          source scripts/test-farm/.env
          ./gradlew :HeirloomsApp:app:connectedAndroidTest \
            -Pandroid.testInstrumentationRunnerArguments.class=digital.heirlooms.crypto.CryptoSmokeTest \
            -Pandroid.injected.invocation.noshards=true \
            -Pandroid.device.serial="$FARM_DEVICE_CURRENT"

      # ---- Upload results -----------------------------------------------------
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: farm-smoke-results-${{ github.run_id }}
          path: |
            test-results/farm/
            HeirloomsApp/app/build/reports/androidTests/

      # ---- Capture logcat on failure ------------------------------------------
      - name: Capture logcat on failure
        if: failure()
        run: |
          source scripts/test-farm/.env
          adb -s "$FARM_DEVICE_CURRENT" logcat -d \
            > test-results/farm/logcat-farm-current-${{ github.run_id }}.txt || true

      - name: Upload logcat artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-farm-current-${{ github.run_id }}
          path: test-results/farm/logcat-*.txt

      # ---- Teardown -----------------------------------------------------------
      - name: Teardown test accounts
        if: always()
        run: bash scripts/test-farm/teardown-accounts.sh
